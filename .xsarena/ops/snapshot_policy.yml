disallow_globs:
  - ".git/**"  # VCS
  - "venv/**"  # env
  - ".venv/**"
  - "__pycache__/**"
  - ".pytest_cache/**"
  - ".mypy_cache/**"
  - ".ruff_cache/**"
  - ".cache/**"
  - "*.pyc"
  - ".xsarena/**"        # internal state/jobs (including config.yml)
  - "books/**"           # generated content
  - "review/**"          # artifacts
  - "tests/**"           # reduce noise for shareable flat packs
  - "examples/**"
  - "tools/**"
  - "scripts/**"
  - "pipelines/**"
  - "packaging/**"
  - "xsa_*snapshot*.*"
  - "repo_flat.txt"
  - "snapshot_chunks/**"
require: ["README.md", "pyproject.toml"]
max_per_file: 180000
total_max: 2500000
fail_on: ["secrets","oversize","disallowed","binary","missing_required"]
